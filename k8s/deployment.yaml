apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-lab-app
  labels:
    app: eks-lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-lab-app
  template:
    metadata:
      labels:
        app: eks-lab-app
    spec:
      containers:
        - name: eks-lab-app
          image: 424049490690.dkr.ecr.us-east-1.amazonaws.com/eks-lab:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
